name: Release

# Release-please pipeline (replaces semantic-release).
#
# Flow:
#   1. Every push to master runs release-please, which maintains a single
#      "release PR" that accumulates version bump + CHANGELOG from the
#      Conventional Commits since the last release.
#   2. Merging that release PR makes release-please cut the git tag and the
#      GitHub Release.
#   3. That release triggers `publish-npm`, which builds and publishes to npm.
#
# npm auth (publish-npm) is OIDC-first:
#   - Preferred: npm **trusted publishing** via GitHub OIDC (no secret). Once the
#     trusted publisher is configured on npmjs.com for this repo + workflow, the
#     NPM_TOKEN secret can be deleted and publishing keeps working.
#   - Fallback/interim: the NPM_TOKEN secret. See docs/RELEASING.md.

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # OIDC for npm trusted publishing + provenance attestation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Do NOT cancel in-progress: a cancelled run mid-publish could leave a tag
  # without its npm release.
  cancel-in-progress: false

jobs:
  # 1) Maintain the release PR; on merge, create the tag + GitHub Release.
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # config-file / manifest-file default to the repo-root files:
          #   release-please-config.json + .release-please-manifest.json

  # 2) On an actual release, build and publish to npm.
  publish-npm:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - name: Checkout the released tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm (>= 11.5.1 supports OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not created"
            exit 1
          fi
          echo "Build artifacts verified successfully"

      - name: Publish to npm (provenance; OIDC trusted publishing or NPM_TOKEN)
        # If a trusted publisher is configured on npmjs.com, npm uses OIDC and
        # NODE_AUTH_TOKEN can be empty. Until then, the NPM_TOKEN secret is used.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # 3) Fan-out notifications, mirroring the previous pipeline. All optional and
  #    skipped silently when the corresponding repo variable/secret is absent.
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [release-please, publish-npm]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Compute release links
        id: links
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "release_url=https://github.com/${{ github.repository }}/releases/tag/${TAG}" >> "$GITHUB_OUTPUT"
          echo "npm_url=https://www.npmjs.com/package/@ooples/token-optimizer-mcp/v/${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Post to Discord (if configured)
        if: vars.DISCORD_WEBHOOK_URL != ''
        run: |
          MSG="New release: token-optimizer-mcp ${{ needs.release-please.outputs.tag_name }}\nRelease notes: ${{ steps.links.outputs.release_url }}\nnpm: ${{ steps.links.outputs.npm_url }}"
          curl -X POST "${{ vars.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}" || echo "Discord notification failed (optional)"

      - name: Post to Slack (if configured)
        if: vars.SLACK_WEBHOOK_URL != ''
        run: |
          MSG="New release: token-optimizer-mcp ${{ needs.release-please.outputs.tag_name }}\nRelease notes: ${{ steps.links.outputs.release_url }}\nnpm: ${{ steps.links.outputs.npm_url }}"
          curl -X POST "${{ vars.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MSG\"}" || echo "Slack notification failed (optional)"

      - name: Email release notification (if configured)
        if: vars.RELEASE_EMAIL_TO != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'token-optimizer-mcp ${{ needs.release-please.outputs.tag_name }} released'
          to: ${{ vars.RELEASE_EMAIL_TO }}
          from: token-optimizer-mcp CI <${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}>
          body: |
            A new version of token-optimizer-mcp has been published.

            Version:       ${{ needs.release-please.outputs.tag_name }}
            Release notes: ${{ steps.links.outputs.release_url }}
            npm:           ${{ steps.links.outputs.npm_url }}

            — automated by the release pipeline

      - name: Comment on resolved issues
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.release-please.outputs.tag_name }}';
            const version = '${{ needs.release-please.outputs.version }}';
            const releaseUrl = '${{ steps.links.outputs.release_url }}';
            let body = '';
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              body = release.body || '';
            } catch (e) {
              console.log('Could not load release body:', e.message);
              return;
            }
            const issueNumbers = [...new Set(
              (body.match(/#(\d+)/g) || []).map((m) => parseInt(m.slice(1), 10))
            )];
            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `This issue has been resolved in version ${version}.\n\nRelease notes: ${releaseUrl}`,
                });
              } catch (error) {
                console.log(`Failed to comment on issue #${issueNumber}:`, error.message);
              }
            }

      - name: Update release summary
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "Version: ${{ needs.release-please.outputs.tag_name }}"
            echo "Release URL: ${{ steps.links.outputs.release_url }}"
            echo "npm URL: ${{ steps.links.outputs.npm_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
