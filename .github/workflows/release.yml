name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required for npm provenance + OIDC publishing

# Mirrors the AiDotNet automated-release pipeline: a new push to master cancels
# any in-flight release so only the latest commit is published.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not created"
            exit 1
          fi
          echo "Build artifacts verified successfully"

      - name: Run tests
        run: npm run test:coverage
        env:
          NODE_OPTIONS: --experimental-vm-modules

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Publish with npm provenance (supply-chain attestation). Requires the
          # id-token: write permission declared above.
          NPM_CONFIG_PROVENANCE: true
        run: npx semantic-release

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: release
    if: needs.release.outputs.new_release_published == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Get release notes
        id: release_notes
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.new_release_version }}"
          echo "release_url=$RELEASE_URL" >> $GITHUB_OUTPUT

      - name: Create notification message
        id: notification
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"
          RELEASE_URL="${{ steps.release_notes.outputs.release_url }}"

          MESSAGE="New release: token-optimizer-mcp v${VERSION}\n"
          MESSAGE="${MESSAGE}Release notes: ${RELEASE_URL}\n"
          MESSAGE="${MESSAGE}npm: https://www.npmjs.com/package/token-optimizer-mcp/v/${VERSION}"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post to Discord (if configured)
        if: vars.DISCORD_WEBHOOK_URL != ''
        run: |
          MESSAGE='${{ steps.notification.outputs.message }}'

          curl -X POST "${{ vars.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MESSAGE\"}" \
            || echo "Discord notification failed (optional)"

      - name: Post to Slack (if configured)
        if: vars.SLACK_WEBHOOK_URL != ''
        run: |
          MESSAGE='${{ steps.notification.outputs.message }}'

          curl -X POST "${{ vars.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MESSAGE\"}" \
            || echo "Slack notification failed (optional)"

      # Email the release version + notes. Runs only when a recipient is
      # configured (repo variable RELEASE_EMAIL_TO); SMTP credentials come from
      # secrets. Mirrors the version-info emails the AiDotNet pipeline sends.
      # Skipped silently if not configured, like the Discord/Slack steps above.
      - name: Email release notification (if configured)
        if: vars.RELEASE_EMAIL_TO != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: 'token-optimizer-mcp v${{ needs.release.outputs.new_release_version }} released'
          to: ${{ vars.RELEASE_EMAIL_TO }}
          from: token-optimizer-mcp CI <${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}>
          body: |
            A new version of token-optimizer-mcp has been published.

            Version:       v${{ needs.release.outputs.new_release_version }}
            Release notes: ${{ steps.release_notes.outputs.release_url }}
            npm:           https://www.npmjs.com/package/token-optimizer-mcp/v/${{ needs.release.outputs.new_release_version }}

            — automated by the release pipeline

      - name: Comment on related issues
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.release.outputs.new_release_version }}';
            const releaseUrl = '${{ steps.release_notes.outputs.release_url }}';

            // Get the release
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: `v${version}`
            });

            // Extract issue numbers from release body
            const issueNumbers = [...new Set(
              (release.body || '').match(/#(\d+)/g)?.map(m => parseInt(m.slice(1))) || []
            )];

            // Comment on each issue
            for (const issueNumber of issueNumbers) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `This issue has been resolved in version ${version}.\n\nRelease notes: ${releaseUrl}`
                });
              } catch (error) {
                console.log(`Failed to comment on issue #${issueNumber}:`, error.message);
              }
            }

      - name: Update release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ needs.release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "Release URL: ${{ steps.release_notes.outputs.release_url }}" >> $GITHUB_STEP_SUMMARY
          echo "npm URL: https://www.npmjs.com/package/token-optimizer-mcp/v/${{ needs.release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
